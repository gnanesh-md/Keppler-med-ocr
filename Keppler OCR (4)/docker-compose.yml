services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keppler
      POSTGRES_PASSWORD: keppler
      POSTGRES_DB: keppler
    ports:
      - "5433:5432"  # host 5432 already used by another local service (Coolify's postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keppler -d keppler"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    restart: unless-stopped
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    restart: unless-stopped
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    network_mode: "host"
    environment:
      DATABASE_URL: postgresql+psycopg://keppler:keppler@127.0.0.1:5433/keppler
      REDIS_URL: redis://127.0.0.1:6379/0
      QDRANT_URL: http://127.0.0.1:6333
      VLLM_BASE_URL: http://127.0.0.1:8700/v1
    volumes:
      - ./uploads:/app/uploads
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "7620"]

  worker:
    restart: unless-stopped
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    network_mode: "host"
    environment:
      DATABASE_URL: postgresql+psycopg://keppler:keppler@127.0.0.1:5433/keppler
      REDIS_URL: redis://127.0.0.1:6379/0
      QDRANT_URL: http://127.0.0.1:6333
      VLLM_BASE_URL: http://127.0.0.1:8700/v1
    volumes:
      - ./uploads:/app/uploads
    command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=INFO", "--concurrency=1"]
    # Scale with: docker compose up -d --scale worker=4

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
